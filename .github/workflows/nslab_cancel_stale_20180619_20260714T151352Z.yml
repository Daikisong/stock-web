name: NSLAB cancel stale 20180619 20260714T151352Z

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  actions: write

jobs:
  cancel:
    if: github.head_ref == 'nslab-cancel-stale-20180619-20260714T151352Z'
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Cancel obsolete retained model run
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $runIds = @(29335598358)
          foreach ($runId in $runIds) {
            try {
              $response = Invoke-WebRequest -Method Post -Headers $headers -Uri "https://api.github.com/repos/Daikisong/stock-web/actions/runs/$runId/cancel" -SkipHttpErrorCheck
              Write-Host "run_id=$runId status=$($response.StatusCode)"
              if ($response.StatusCode -notin @(202, 409)) { throw "unexpected status $($response.StatusCode)" }
            } catch {
              Write-Host $_
              throw
            }
          }
