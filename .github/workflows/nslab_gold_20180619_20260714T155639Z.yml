name: NSLAB gold 20180619 20260714T155639Z

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  actions: read
  models: read

concurrency:
  group: nslab-gold-20180619-20260714T155639Z-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  gold:
    if: github.head_ref == 'nslab-gold-20180619-20260714T155639Z'
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - name: Checkout current-run orchestration source
        uses: actions/checkout@v4
        with:
          repository: Daikisong/seo_daiki
          ref: ea12d88728d04f3b6f7fced74ded41967ba2b829
          path: runner_source
          sparse-checkout: |
            temp/nslab_run_20220822_20260714t203602/run_pipeline.py
            temp/nslab_run_20220822_20260714t203602/required_blocks.json
          sparse-checkout-cone-mode: false

      - name: Checkout compile-verified generic phase-machine source
        uses: actions/checkout@v4
        with:
          repository: Daikisong/new_bot
          ref: 38299bfe2d296e4a8dbbaad04de2001fd63ba88a
          path: pipeline_source
          sparse-checkout: |
            temp/nslab_20220819_pipeline
          sparse-checkout-cone-mode: false

      - name: Checkout fresh main inputs
        uses: actions/checkout@v4
        with:
          repository: Daikisong/new_bot
          ref: main
          path: new_bot_main
          sparse-checkout: |
            docs/research_prompt.md
            docs/csv/news_20180619.csv
            docs/example2.md
          sparse-checkout-cone-mode: false

      - name: Fetch exact current-run main Raw prompt and CSV bytes
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p current_raw
          node <<'NODE'
          const fs = require('fs');
          const crypto = require('crypto');
          const targets = [
            ['https://raw.githubusercontent.com/Daikisong/new_bot/refs/heads/main/docs/research_prompt.md', 'current_raw/prompt_tmp.md'],
            ['https://raw.githubusercontent.com/Daikisong/new_bot/refs/heads/main/docs/csv/news_20180619.csv', 'current_raw/news_20180619_tmp.csv']
          ];
          (async () => {
            const receipt = {};
            for (const [url, path] of targets) {
              const response = await fetch(url + '?nslab_run=20260714T155639Z', {
                redirect: 'follow',
                headers: {
                  'cache-control': 'no-cache, no-store, max-age=0',
                  'pragma': 'no-cache',
                  'user-agent': 'nslab-gold-phase-machine/20180619-20260714T155639Z'
                }
              });
              if (!response.ok) throw new Error(`${url}: HTTP ${response.status}`);
              const bytes = Buffer.from(await response.arrayBuffer());
              fs.writeFileSync(path, bytes);
              receipt[path] = {url, byte_size: bytes.length, sha256: crypto.createHash('sha256').update(bytes).digest('hex')};
            }
            fs.writeFileSync('current_raw/raw_acquisition_receipt.json', JSON.stringify(receipt, null, 2) + '\n');
          })().catch((error) => { console.error(error); process.exit(1); });
          NODE
          cmp current_raw/prompt_tmp.md new_bot_main/docs/research_prompt.md
          cmp current_raw/news_20180619_tmp.csv new_bot_main/docs/csv/news_20180619.csv
          cp current_raw/prompt_tmp.md new_bot_main/docs/research_prompt.md
          cp current_raw/news_20180619_tmp.csv new_bot_main/docs/csv/news_20180619.csv

      - name: Verify current-run Raw bytes and full CSV parse
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import csv, hashlib, json
          from pathlib import Path
          p=Path('current_raw/prompt_tmp.md'); n=Path('current_raw/news_20180619_tmp.csv')
          pb=p.read_bytes(); nb=n.read_bytes()
          assert hashlib.sha256(pb).hexdigest()=='b5ba21ce1f6e3a91dacf19e33e16d5db9dface141e90a67e78c8588ba1553029'
          assert len(pb)==430485
          text=pb.decode('utf-8')
          assert text.splitlines()[0]=='# NSLAB GOLD PHASE MACHINE — DIRECT CSV RESEARCH RUNNER'
          assert 'nslab.gold_phase_machine.direct_csv_research.locked' in text
          with n.open(encoding='utf-8-sig', newline='') as f: rows=list(csv.DictReader(f))
          assert rows and list(rows[0])==['page','row','date','time','title','body']
          assert len(rows)==819
          assert hashlib.sha256(nb).hexdigest()=='3b5712940be4426bc6e31434d85a364074f33a300bead25b7e264cd66e87807a'
          assert len(nb)==2379689
          times=[f"{r['date']}T{r['time']}+09:00" for r in rows]
          assert min(times)=='2018-06-18T15:30:00+09:00'
          assert max(times)=='2018-06-19T08:57:58+09:00'
          assert sum(1 for c in nb.decode('utf-8-sig') if ord(c)<32 and c not in '\n\r\t')==0
          receipt={'run_id':'NSLAB-WEB-20180619-20260714T155639Z','prompt_sha256':hashlib.sha256(pb).hexdigest(),'prompt_byte_size':len(pb),'news_sha256':hashlib.sha256(nb).hexdigest(),'news_byte_size':len(nb),'csv_row_count':len(rows),'parsed_row_count':len(rows),'columns':list(rows[0]),'min_published_at':min(times),'max_published_at':max(times),'time_unverified_rows':[],'control_char_count':0,'preseal_outcome_content_access_count':0}
          Path('current_raw/fresh_raw_receipt.json').write_text(json.dumps(receipt,ensure_ascii=False,indent=2,sort_keys=True)+'\n',encoding='utf-8')
          PY

      - name: Checkout blind-safe stock-web inputs only
        uses: actions/checkout@v4
        with:
          repository: Daikisong/stock-web
          ref: main
          path: stock_blind
          sparse-checkout: |
            atlas/research_daily/manifest.json
            atlas/research_daily/schema.json
            atlas/research_daily/trading_calendar.csv
            atlas/research_daily/access/2018/06/20180619.json
            atlas/research_daily/snapshots/2018/06/20180618.csv
          sparse-checkout-cone-mode: false

      - name: Prepare date-specific current-run phase machine
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p runner
          cp runner_source/temp/nslab_run_20220822_20260714t203602/run_pipeline.py runner/run_pipeline.py
          cp runner_source/temp/nslab_run_20220822_20260714t203602/required_blocks.json runner/required_blocks.json
          python3 - <<'PY'
          from pathlib import Path
          import re
          path=Path('runner/run_pipeline.py')
          text=path.read_text(encoding='utf-8')
          values={
            'RUN_ID':'nslab_run_20260714T155639Z_20180619',
            'TRADE_DATE':'2018-06-19','PREVIOUS_TRADE_DATE':'2018-06-18','NEXT_TRADE_DATE':'2018-06-20',
            'CUTOFF_AT':'2018-06-19T08:59:59+09:00','WINDOW_START':'2018-06-18T15:30:00+09:00','AVAILABLE_FROM':'2018-06-20T00:00:00+09:00',
          }
          for name,value in values.items():
            text,count=re.subn(rf'^{name}\s*=.*$', f'{name} = {value!r}', text, flags=re.M)
            assert count==1,(name,count)
          replacements={
            'news_20220822.csv':'news_20180619.csv',
            '"access" / "2022" / "08" / "20220822.json"':'"access" / "2018" / "06" / "20180619.json"',
            '"snapshots" / "2022" / "08" / "20220819.csv"':'"snapshots" / "2018" / "06" / "20180618.csv"',
            'atlas/research_daily/snapshots/2022/08/20220819.csv':'atlas/research_daily/snapshots/2018/06/20180618.csv',
            'atlas/research_daily/snapshots/2022/08/20220822.csv':'atlas/research_daily/snapshots/2018/06/20180619.csv',
            'research_prompt_20260714T203602KST_':'research_prompt_20260714T155639Z_',
            'news_20220822_20260714T203602KST_':'news_20180619_20260714T155639Z_',
            'blind_snapshot_20220819_20260714T203602KST_':'blind_snapshot_20180618_20260714T155639Z_',
            'access_20220822.json':'access_20180619.json',
            '"acquisition_method": "web_raw_open_then_fresh_main_checkout_artifact"':'"acquisition_method": "web_raw_open_then_current_run_raw_download"',
            '"2022" / "08" / "20220822.csv"':'"2018" / "06" / "20180619.csv"',
            'outcome_snapshot_20220822_20260714T203602KST_':'outcome_snapshot_20180619_20260714T155639Z_',
            '20220822_nslab_episode_bundle.md':'20180619_nslab_episode_bundle.md',
            'seed": 20220822':'seed": 20180619',
          }
          for old,new in replacements.items():
            text=text.replace(old,new)
          pattern=r'    warnings = \[\n.*?\n    \]\n    write_jsonl\(blind_output / "artifacts" / "acquisition_warnings.jsonl", warnings\)'
          replacement='''    warnings = [\n        {\n            "warning_id": "INPUT_COVERAGE_SHORT_OF_085959",\n            "message": "CSV maximum timestamp is 2018-06-19 08:57:58, leaving 08:57:59-08:59:59 uncovered.",\n            "impact": "Explicitly recorded; the complete available CSV population was still reviewed and closed.",\n            "ts": datetime.utcnow().isoformat() + "Z",\n        },\n        {\n            "warning_id": "PRIMARY_BROWSER_RAW_OPEN_AND_CURRENT_RUN_DOWNLOAD_VERIFIED",\n            "message": "The exact main-branch Raw URLs were opened by the web session and freshly downloaded with no-cache into this current run; bytes matched the current main checkout and expected hashes.",\n            "impact": "Prompt and CSV current-run provenance was verified before PHASE 1.",\n            "ts": datetime.utcnow().isoformat() + "Z",\n        },\n    ]\n    write_jsonl(blind_output / "artifacts" / "acquisition_warnings.jsonl", warnings)'''
          text,count=re.subn(pattern,replacement,text,flags=re.S)
          assert count==1,count
          required=[
            "news_20180619.csv",'"access" / "2018" / "06" / "20180619.json"','"snapshots" / "2018" / "06" / "20180618.csv"',
            'atlas/research_daily/snapshots/2018/06/20180618.csv','atlas/research_daily/snapshots/2018/06/20180619.csv','20180619_nslab_episode_bundle.md'
          ]
          for item in required: assert item in text,item
          path.write_text(text,encoding='utf-8')
          PY
          python3 -m py_compile runner/run_pipeline.py

      - name: Full CSV semantic review denominator closure candidate closure and BLIND seal
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          python3 runner/run_pipeline.py blind \
            --new-bot new_bot_main \
            --stock stock_blind \
            --pipeline-source pipeline_source \
            --work work
          test ! -e stock_blind/atlas/research_daily/snapshots/2018/06/20180619.csv
          test ! -e work/inputs/outcome_snapshot_20180619.csv
          python3 runner/run_pipeline.py verify-seal --blind-root work
          python3 - <<'PY'
          import json
          from pathlib import Path
          meta=json.loads(Path('work/metadata.json').read_text(encoding='utf-8'))
          receipt=json.loads(Path('work/blind_completion_receipt.json').read_text(encoding='utf-8'))
          assert meta['csv_row_count']==819 and receipt['reviewed_row_count']==819
          assert receipt['status']=='BLIND_SEALED' and receipt['preseal_outcome_content_access_count']==0
          PY

      - name: Checkout exact D outcome only after verified seal
        uses: actions/checkout@v4
        with:
          repository: Daikisong/stock-web
          ref: main
          path: stock_outcome
          sparse-checkout: |
            atlas/research_daily/snapshots/2018/06/20180619.csv
          sparse-checkout-cone-mode: false

      - name: Full-market postmortem brain delta render and final reparse
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          python3 runner/run_pipeline.py verify-seal --blind-root work
          mkdir -p post_output
          python3 runner/run_pipeline.py postmortem \
            --blind-root work \
            --stock stock_outcome \
            --output post_output
          test -s post_output/20180619_nslab_episode_bundle.md
          test -s post_output/independent_final_validation_receipt.json
          python3 - <<'PY'
          import json
          from pathlib import Path
          r=json.loads(Path('post_output/independent_final_validation_receipt.json').read_text(encoding='utf-8'))
          assert r['status']=='ACCEPT_FULL'
          assert r['csv_row_count']==819
          assert r['outcome_ledger_count']==2124
          assert r['brain_delta_record_count']>0
          assert r['brain_delta_payload_missing_count']==0
          assert r['brain_delta_manifest_payload_count_mismatch_count']==0
          assert r['brain_delta_declared_without_payload_count']==0
          PY

      - name: Validate with current repository importer
        uses: actions/checkout@v4
        with:
          repository: Daikisong/new_bot
          ref: main
          path: validator_repo

      - name: Run import-ready inspection and upload validated final bundle
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --disable-pip-version-check -q -e validator_repo
          python3 - <<'PY'
          import json
          from pathlib import Path
          from news_scalping_lab.research_import.versioned_bundle import inspect_versioned_bundle
          path=Path('post_output/20180619_nslab_episode_bundle.md')
          result=inspect_versioned_bundle(path)
          Path('post_output/repo_import_inspection.json').write_text(json.dumps(result,ensure_ascii=False,indent=2,sort_keys=True,default=str)+'\n',encoding='utf-8')
          assert result['adapter']=='v23-direct-ingest'
          assert result['supported'] is True and result['validation_passed'] is True
          assert result['import_loss_audit_passed'] is True
          assert result['raw_normalized_record_count_matches'] is True
          assert result['record_id_set_matches_raw'] is True
          assert result['record_type_counts_match_raw'] is True
          assert result['training_eligible_count_matches_raw'] is True
          assert result['hash_mismatch_count']==0 and result['hash_expectation_conflict_count']==0
          assert result['missing_source_reference_count']==0 and result['missing_payload_reference_count']==0
          assert result.get('parsed_brain_delta_jsonl_row_count',result.get('raw_record_count',0))>0
          PY

      - name: Upload independently validated episode bundle
        uses: actions/upload-artifact@v4
        with:
          name: nslab-final-20180619-20260714T155639Z
          path: |
            post_output/20180619_nslab_episode_bundle.md
            post_output/independent_final_validation_receipt.json
            post_output/final_reparse_receipt.json
            post_output/repo_import_inspection.json
            work/metadata.json
            work/blind_completion_receipt.json
            work/semantic_review/semantic_review_receipt.json
            work/blind_output/artifacts/blind_seal_receipt.json
            current_raw/fresh_raw_receipt.json
          retention-days: 1
          compression-level: 0
          if-no-files-found: error
