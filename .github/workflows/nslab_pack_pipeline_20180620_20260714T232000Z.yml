name: NSLAB pack pipeline 20180620 20260714T232000Z

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'temp/nslab_pack_pipeline_20180620_20260714T232000Z/pipeline_url.txt'

permissions:
  contents: write
  actions: read

concurrency:
  group: nslab-pack-pipeline-20180620-20260714T232000Z-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pack:
    if: github.head_ref == 'nslab-pack-pipeline-20180620-20260714T232000Z'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
          sparse-checkout: |
            temp/nslab_pack_pipeline_20180620_20260714T232000Z/pipeline_url.txt
            temp/nslab_shared_20180620_20260714T232000Z
          sparse-checkout-cone-mode: false
      - name: Download exact signed artifact and commit only pipeline source
        shell: bash
        run: |
          set -euo pipefail
          URL="$(cat temp/nslab_pack_pipeline_20180620_20260714T232000Z/pipeline_url.txt)"
          test -n "$URL"
          curl -fL --retry 3 --connect-timeout 30 --max-time 180 "$URL" -o pipeline_bundle.zip
          rm -rf pipeline_bundle
          mkdir pipeline_bundle
          unzip -q pipeline_bundle.zip -d pipeline_bundle
          test -s pipeline_bundle/pipeline_source/temp/nslab_20220819_pipeline/common.py
          DEST=temp/nslab_shared_20180620_20260714T232000Z/pipeline_source/temp
          rm -rf "${DEST%/temp}"
          mkdir -p "$DEST"
          cp -R pipeline_bundle/pipeline_source/temp/nslab_20220819_pipeline "$DEST/"
          python -m py_compile "$DEST"/nslab_20220819_pipeline/{common.py,blind.py,reseal.py,postmortem.py}
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add --sparse temp/nslab_shared_20180620_20260714T232000Z
          git commit -m 'temp: materialize compile-verified NSLAB pipeline source'
          git push origin HEAD:${{ github.head_ref }}
