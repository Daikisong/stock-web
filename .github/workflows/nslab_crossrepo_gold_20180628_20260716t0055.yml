name: NSLAB crossrepo gold 20180628 20260716T0055

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  actions: read
  models: read

concurrency:
  group: nslab-crossrepo-gold-20180628-20260716T0055-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  execute:
    if: github.head_ref == 'nslab-clean-run-20180628-20260716t0055'
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      GITHUB_TOKEN: ${{ github.token }}
      PYTHONUNBUFFERED: '1'
    steps:
      - name: Checkout cross-repo bootstrap branch
        uses: actions/checkout@v4
        with:
          path: branch_code
          sparse-checkout: |
            temp/nslab_crossrepo_bootstrap_20180628_20260716t0055.py
          sparse-checkout-cone-mode: false
          fetch-depth: 1

      - name: Checkout exact current new_bot main inputs, importer, and successful protocol
        uses: actions/checkout@v4
        with:
          repository: Daikisong/new_bot
          ref: main
          path: input_src
          fetch-depth: 1
          sparse-checkout: |
            .github/workflows/nslab_gold_20180621_20260715T002346Z.yml
            docs/research_prompt.md
            docs/csv/news_20180628.csv
            docs/example2.md
            pyproject.toml
            README.md
            src/news_scalping_lab
          sparse-checkout-cone-mode: false

      - name: Checkout compile-verified phase-machine source
        uses: actions/checkout@v4
        with:
          repository: Daikisong/stock-web
          ref: nslab-pack-pipeline-20180620-20260714T232000Z
          path: pipeline_transport
          fetch-depth: 1
          sparse-checkout: |
            temp/nslab_shared_20180620_20260714T232000Z/pipeline_source/temp/nslab_20220819_pipeline
          sparse-checkout-cone-mode: false

      - name: Checkout BLIND-safe routing metadata and P snapshot only
        uses: actions/checkout@v4
        with:
          repository: Daikisong/stock-web
          ref: main
          path: stock_preseal
          fetch-depth: 1
          sparse-checkout: |
            atlas/research_daily/access/2018/06/20180628.json
            atlas/research_daily/manifest.json
            atlas/research_daily/schema.json
            atlas/research_daily/trading_calendar.csv
            atlas/research_daily/snapshots/2018/06/20180627.csv
          sparse-checkout-cone-mode: false

      - name: Execute fresh full GOLD phase machine and independent reparse
        run: python branch_code/temp/nslab_crossrepo_bootstrap_20180628_20260716t0055.py

      - name: Upload independently validated episode bundle
        uses: actions/upload-artifact@v4
        with:
          name: nslab-final-crossrepo-20180628-20260716T0055
          path: final_artifact_20180628_20260716t001004/
          retention-days: 1
          compression-level: 0
          if-no-files-found: error

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nslab-failure-crossrepo-20180628-20260716T0055
          path: failure_artifact_20180628_20260716t001004/
          retention-days: 1
          compression-level: 0
          if-no-files-found: ignore
