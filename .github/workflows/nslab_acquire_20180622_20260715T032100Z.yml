name: NSLAB acquire 20180622 20260715T032100Z

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'temp/nslab_acquire_20180622_20260715T032100Z/trigger.txt'

permissions:
  contents: read
  actions: read

jobs:
  acquire:
    if: github.head_ref == 'nslab-acquire-20180622-20260715T032100Z'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout current stock-web main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          sparse-checkout: |
            atlas/research_daily/access/2018/06/20180622.json
            atlas/research_daily/manifest.json
            atlas/research_daily/schema.json
            atlas/research_daily/trading_calendar.csv
            atlas/research_daily/snapshots/2018/06/20180621.csv
          sparse-checkout-cone-mode: false
      - name: Fresh exact new_bot Raw acquisition and full parse
        shell: bash
        run: |
          set -euo pipefail
          ROOT=fresh
          mkdir -p "$ROOT/new_bot/docs/csv" "$ROOT/stock/atlas/research_daily/access/2018/06" "$ROOT/stock/atlas/research_daily/snapshots/2018/06" "$ROOT/stock/atlas/research_daily"
          BASE='https://raw.githubusercontent.com/Daikisong/new_bot/refs/heads/main'
          STAMP=20260715T032100Z
          curl -fL --retry 3 --connect-timeout 30 --max-time 240 -H 'Cache-Control: no-cache, no-store, max-age=0' -H 'User-Agent: NSLAB-current-run-20180622' "$BASE/docs/research_prompt.md?nslab=$STAMP-1" -o "$ROOT/new_bot/docs/research_prompt.md"
          curl -fL --retry 3 --connect-timeout 30 --max-time 240 -H 'Cache-Control: no-cache, no-store, max-age=0' -H 'User-Agent: NSLAB-current-run-20180622' "$BASE/docs/csv/news_20180622.csv?nslab=$STAMP-2" -o "$ROOT/new_bot/docs/csv/news_20180622.csv"
          curl -fL --retry 3 --connect-timeout 30 --max-time 240 -H 'Cache-Control: no-cache, no-store, max-age=0' -H 'User-Agent: NSLAB-current-run-20180622' "$BASE/docs/example2.md?nslab=$STAMP-3" -o "$ROOT/new_bot/docs/example2.md"
          cp atlas/research_daily/access/2018/06/20180622.json "$ROOT/stock/atlas/research_daily/access/2018/06/20180622.json"
          cp atlas/research_daily/manifest.json "$ROOT/stock/atlas/research_daily/manifest.json"
          cp atlas/research_daily/schema.json "$ROOT/stock/atlas/research_daily/schema.json"
          cp atlas/research_daily/trading_calendar.csv "$ROOT/stock/atlas/research_daily/trading_calendar.csv"
          cp atlas/research_daily/snapshots/2018/06/20180621.csv "$ROOT/stock/atlas/research_daily/snapshots/2018/06/20180621.csv"
          python - <<'PY'
          import csv, hashlib, json
          from datetime import datetime, timedelta
          from pathlib import Path
          r=Path('fresh')
          prompt=r/'new_bot/docs/research_prompt.md'; news=r/'new_bot/docs/csv/news_20180622.csv'; example=r/'new_bot/docs/example2.md'
          access_path=r/'stock/atlas/research_daily/access/2018/06/20180622.json'; blind=r/'stock/atlas/research_daily/snapshots/2018/06/20180621.csv'
          p=prompt.read_bytes(); n=news.read_bytes(); b=blind.read_bytes(); e=example.read_bytes()
          ps=hashlib.sha256(p).hexdigest(); ns=hashlib.sha256(n).hexdigest(); bs=hashlib.sha256(b).hexdigest(); es=hashlib.sha256(e).hexdigest()
          assert ps=='b5ba21ce1f6e3a91dacf19e33e16d5db9dface141e90a67e78c8588ba1553029' and len(p)==430485
          pt=p.decode('utf-8'); assert pt.splitlines()[0]=='# NSLAB GOLD PHASE MACHINE — DIRECT CSV RESEARCH RUNNER'; assert 'nslab.gold_phase_machine.direct_csv_research.locked' in pt
          with news.open(encoding='utf-8-sig',newline='') as f: rows=list(csv.DictReader(f))
          assert rows and list(rows[0])==['page','row','date','time','title','body']
          parsed=[]; bad=[]
          for i,row in enumerate(rows,1):
              try: parsed.append(datetime.fromisoformat(f"{row['date']}T{row['time']}+09:00"))
              except Exception: bad.append(i)
          access=json.loads(access_path.read_text(encoding='utf-8'))
          expected={'trade_date':'2018-06-22','previous_trade_date':'2018-06-21','next_trade_date':'2018-06-25','blind_snapshot_path':'atlas/research_daily/snapshots/2018/06/20180621.csv','outcome_snapshot_path':'atlas/research_daily/snapshots/2018/06/20180622.csv','build_status':'complete'}
          for k,v in expected.items(): assert access.get(k)==v,(k,access.get(k),v)
          with blind.open(encoding='utf-8-sig',newline='') as f: brows=list(csv.DictReader(f))
          assert bs==access['blind_snapshot_sha256'] and len(b)==access['blind_snapshot_bytes'] and len(brows)==access['blind_snapshot_row_count']
          assert max(str(x.get('max_source_date','')) for x in brows)<='2018-06-21'
          control=sum(1 for ch in n.decode('utf-8-sig') if ord(ch)<32 and ch not in '\n\r\t')
          assert control==0
          window=datetime.fromisoformat('2018-06-21T15:30:00+09:00'); cutoff=datetime.fromisoformat('2018-06-22T08:59:59+09:00')
          uncovered=[]
          if min(parsed)>window: uncovered.append(f'{window.isoformat()}..{(min(parsed)-timedelta(seconds=1)).isoformat()}')
          if max(parsed)<cutoff: uncovered.append(f'{(max(parsed)+timedelta(seconds=1)).isoformat()}..{cutoff.isoformat()}')
          receipt={'schema_version':'nslab.current_run_acquisition_verification.v1','status':'CURRENT_RUN_RAW_ACQUISITION_VERIFIED','prompt_sha256':ps,'prompt_byte_size':len(p),'news_sha256':ns,'news_byte_size':len(n),'csv_row_count':len(rows),'columns':list(rows[0]),'min_published_at':min(parsed).isoformat(),'max_published_at':max(parsed).isoformat(),'time_unverified_rows':bad,'control_char_count':control,'example_sha256':es,'example_byte_size':len(e),'trade_date':'2018-06-22','previous_trade_date':'2018-06-21','next_trade_date':'2018-06-25','official_trade_day':True,'blind_snapshot_sha256':bs,'blind_snapshot_byte_size':len(b),'blind_snapshot_row_count':len(brows),'outcome_snapshot_sha256':access['outcome_snapshot_sha256'],'outcome_snapshot_byte_size':access['outcome_snapshot_bytes'],'outcome_snapshot_row_count':access['outcome_snapshot_row_count'],'input_coverage_warning':None if not uncovered else 'CSV actual publication range does not fully cover expected boundary seconds.','uncovered_time_ranges':uncovered,'preseal_outcome_content_access_count':0}
          (r/'acquisition_verification.json').write_text(json.dumps(receipt,ensure_ascii=False,indent=2,sort_keys=True)+'\n',encoding='utf-8')
          print(json.dumps(receipt,ensure_ascii=False,sort_keys=True))
          PY
      - name: Upload verified fresh preseal inputs
        uses: actions/upload-artifact@v4
        with:
          name: nslab-fresh-preseal-20180622-20260715T032100Z
          path: fresh/
          retention-days: 1
          compression-level: 0
          if-no-files-found: error
