name: NSLAB acquisition log tail 20180619 20260714T192700Z

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  actions: read

jobs:
  tail:
    if: github.head_ref == 'nslab-logtail-20180619-20260714T192700Z'
    runs-on: ubuntu-latest
    steps:
      - name: Print only failed acquisition tail
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          curl -sS -L \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Daikisong/stock-web/actions/jobs/87183101531/logs \
            -o job.log
          python - <<'PY'
          from pathlib import Path
          lines=Path('job.log').read_text(encoding='utf-8-sig',errors='replace').splitlines()
          print('\n'.join(lines[-20:]))
          PY
